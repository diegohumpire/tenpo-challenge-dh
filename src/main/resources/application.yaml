logging:
    pattern:
        console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level ${PID:- } --- [%15.15t] %-40.40logger{39} : %m%n%wEx"

spring:
    application:
        name: dhapi
    docker:
        compose:
            enabled: false

    r2dbc:
        url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/tenpo_db}
        username: ${SPRING_R2DBC_USERNAME:tenpo}
        password: ${SPRING_R2DBC_PASSWORD:tenpo_pass}

    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tenpo_db}
        username: ${SPRING_DATASOURCE_USERNAME:tenpo}
        password: ${SPRING_DATASOURCE_PASSWORD:tenpo_pass}
        driver-class-name: org.postgresql.Driver

    flyway:
        url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/tenpo_db}
        user: ${SPRING_FLYWAY_USER:tenpo}
        password: ${SPRING_FLYWAY_PASSWORD:tenpo_pass}
        enabled: true

    data:
        redis:
            host: ${SPRING_DATA_REDIS_HOST:localhost}
            port: ${SPRING_DATA_REDIS_PORT:6379}

percentage:
    # Selects the PercentageProvider implementation.
    # Values: memory | postman-mock | external (default)
    provider: ${PERCENTAGE_PROVIDER:memory}
    # Timeout in seconds for external HTTP calls (HttpPercentageClient, PostmanMockPercentageClient).
    timeout-seconds: ${PERCENTAGE_TIMEOUT_SECONDS:5}
    cache:
        ttl: ${PERCENTAGE_CACHE_TTL:1800}
    in-memory:
        value: ${PERCENTAGE_MEMORY_VALUE:10.0}
    postman-mock:
        base-url: ${PERCENTAGE_POSTMAN_BASE_URL:https://ec995055-c0c3-4482-aa85-89f5660540f0.mock.pstmn.io}
        path: ${PERCENTAGE_POSTMAN_PATH:/mock/percentage}
    external:
        base-url: ${PERCENTAGE_EXTERNAL_BASE_URL:http://localhost:8080}
        path: ${PERCENTAGE_EXTERNAL_PATH:/percentage}
    retry:
        max-attempts: ${PERCENTAGE_RETRY_MAX_ATTEMPTS:3}
        initial-backoff-seconds: ${PERCENTAGE_RETRY_INITIAL_BACKOFF_SECONDS:1}
        max-backoff-seconds: ${PERCENTAGE_RETRY_MAX_BACKOFF_SECONDS:5}
    circuit-breaker:
        failure-rate-threshold: ${PERCENTAGE_CB_FAILURE_RATE_THRESHOLD:50}
        slow-call-rate-threshold: ${PERCENTAGE_CB_SLOW_CALL_RATE_THRESHOLD:100}
        slow-call-duration-seconds: ${PERCENTAGE_CB_SLOW_CALL_DURATION_SECONDS:3}
        sliding-window-size: ${PERCENTAGE_CB_SLIDING_WINDOW_SIZE:10}
        minimum-number-of-calls: ${PERCENTAGE_CB_MINIMUM_NUMBER_OF_CALLS:5}
        wait-duration-in-open-state-seconds: ${PERCENTAGE_CB_WAIT_DURATION_OPEN_SECONDS:30}
        permitted-calls-in-half-open-state: ${PERCENTAGE_CB_PERMITTED_CALLS_HALF_OPEN:3}

rate-limit:
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:3}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}

springdoc:
    api-docs:
        path: /v3/api-docs
    swagger-ui:
        path: /swagger-ui.html
