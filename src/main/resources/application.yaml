spring:
    application:
        name: dhapi
    docker:
        compose:
            enabled: false

    r2dbc:
        url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/tenpo_db}
        username: ${SPRING_R2DBC_USERNAME:tenpo}
        password: ${SPRING_R2DBC_PASSWORD:tenpo_pass}

    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tenpo_db}
        username: ${SPRING_DATASOURCE_USERNAME:tenpo}
        password: ${SPRING_DATASOURCE_PASSWORD:tenpo_pass}
        driver-class-name: org.postgresql.Driver

    flyway:
        url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/tenpo_db}
        user: ${SPRING_FLYWAY_USER:tenpo}
        password: ${SPRING_FLYWAY_PASSWORD:tenpo_pass}
        enabled: true

    data:
        redis:
            host: ${SPRING_DATA_REDIS_HOST:localhost}
            port: ${SPRING_DATA_REDIS_PORT:6379}

percentage:
    # Selects the PercentageProvider implementation.
    # Values: memory | postman-mock | external (default)
    provider: ${PERCENTAGE_PROVIDER:memory}
    in-memory:
        value: ${PERCENTAGE_MEMORY_VALUE:10.0}
    postman-mock:
        base-url: ${PERCENTAGE_POSTMAN_BASE_URL:https://ec995055-c0c3-4482-aa85-89f5660540f0.mock.pstmn.io}
        path: ${PERCENTAGE_POSTMAN_PATH:/mock/percentage}
    external:
        base-url: ${PERCENTAGE_EXTERNAL_BASE_URL:http://localhost:8080}
        path: ${PERCENTAGE_EXTERNAL_PATH:/percentage}

rate-limit:
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:3}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}

springdoc:
    api-docs:
        path: /v3/api-docs
    swagger-ui:
        path: /swagger-ui.html
